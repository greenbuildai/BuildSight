    #header {
      background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 100%);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid rgba(0, 255, 136, 0.15);
      box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    #header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }
    #header .badge {
      font-size: 11px;
      background: rgba(0,255,136,0.12);
      color: #00ff88;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid rgba(0,255,136,0.25);
      letter-spacing: 0.5px;
    }
    #header .site-info {
      margin-left: auto;
      font-size: 12px;
      color: #8899aa;
    }
    #map {
      width: 100%;
      height: calc(100vh - 52px);
    }

    /* Legend */
    .legend {
      background: rgba(10, 14, 23, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      font-size: 12px;
      line-height: 1.8;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 210px;
    }
    .legend h4 {
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(0,255,136,0.15);
      padding-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* Info panel */
    .info-panel {
      background: rgba(10, 14, 23, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      font-size: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 280px;
      max-width: 320px;
    }
    .info-panel h4 {
      font-size: 14px;
      font-weight: 700;
      color: #00ccff;
      margin-bottom: 8px;
    }
    .info-panel .detail {
      margin-bottom: 4px;
      color: #bbb;
    }
    .info-panel .detail strong {
      color: #e0e0e0;
    }

    /* Tooltip styling */
    .zone-tooltip {
      background: rgba(10, 14, 23, 0.95) !important;
      border: 1px solid rgba(0, 255, 136, 0.3) !important;
      color: #e0e0e0 !important;
      border-radius: 8px !important;
      padding: 8px 12px !important;
      font-size: 12px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
    }
    .zone-tooltip .zone-name {
      font-weight: 700;
      color: #00ff88;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .leaflet-tooltip-top:before,
    .leaflet-tooltip-bottom:before,
    .leaflet-tooltip-left:before,
    .leaflet-tooltip-right:before {
      border-top-color: rgba(10, 14, 23, 0.95) !important;
    }

      opacity: 0.6
    }).addTo(map);

    // â”€â”€â”€ Info Control â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const infoCtrl = L.control({ position: 'topright' });
    infoCtrl.onAdd = function () {
      this._div = L.DomUtil.create('div', 'info-panel');
      this.update();
      return this._div;
    };
    infoCtrl.update = function (props) {
      if (!props) {
        this._div.innerHTML = '<h4>ðŸ—ï¸ Zone Inspector</h4><div class="detail" style="color:#667">Hover over a zone to inspect</div>';
        return;
      }
      const riskBadge = props.risk !== 'none'
        ? `<span style="background:${RISK_COLORS[props.risk] || '#666'};color:#000;padding:2px 8px;border-radius:6px;font-weight:700;font-size:11px">${props.risk}</span>`
        : '';
      this._div.innerHTML = `
        <h4>${props.zone.replace(/_/g, ' ').toUpperCase()}</h4>
        <div class="detail">${riskBadge}${props.alert_level ? ` <strong>${props.alert_level}</strong>` : ''}</div>
        <div class="detail" style="margin-top:6px">${props.description}</div>
        <div class="detail" style="margin-top:6px"><strong>Height:</strong> ${props.z_base_m}m â†’ ${props.z_top_m}m (${props.height_m}m)</div>
        ${props.bocw_clause ? `<div class="detail"><strong>BOCW:</strong> ${props.bocw_clause}</div>` : ''}
        ${props.nbc_clause ? `<div class="detail"><strong>NBC:</strong> ${props.nbc_clause}</div>` : ''}
        ${props.elevation_range ? `<div class="detail"><strong>Elevation:</strong> ${props.elevation_range}</div>` : ''}
      `;
    };
    infoCtrl.addTo(map);

    // â”€â”€â”€ Legend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const legend = L.control({ position: 'bottomleft' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h4>Risk Zones</h4>
        <div class="legend-item"><div class="legend-color" style="background:#ff1744"></div> CRITICAL â€” Staircase / Roof Edge</div>
        <div class="legend-item"><div class="legend-color" style="background:#ff6d00"></div> HIGH â€” Scaffolding Perimeter</div>
        <div class="legend-item"><div class="legend-color" style="background:#ffab00"></div> MODERATE â€” Interior Construction</div>
        <div class="legend-item"><div class="legend-color" style="background:#00e676"></div> LOW â€” Parking / Ground Level</div>
        <div class="legend-item"><div class="legend-color" style="background:#42a5f5"></div> Site Boundary</div>
        <div class="legend-item"><div class="legend-color" style="background:#e040fb;border-radius:50%"></div> Camera / Corner Points</div>
      `;
      return div;
    };
    legend.addTo(map);

    // â”€â”€â”€ Render layers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // Separate layers for toggle
    const riskLayers = L.layerGroup().addTo(map);
    const heightLayers = L.layerGroup().addTo(map);
    const cameraLayers = L.layerGroup().addTo(map);
    const pointLayers = L.layerGroup().addTo(map);

    function styleFeature(feature) {
      const zone = feature.properties.zone;
      const cfg = ZONE_COLORS[zone] || { fill: '#888', stroke: '#aaa', weight: 1 };
      const isHeight = !!feature.properties.height_zone;

      return {
        fillColor: cfg.fill,
        color: cfg.stroke,
        weight: cfg.weight || 1.5,
        opacity: 0.9,
        fillOpacity: isHeight ? 0.12 : 0.28,
        dashArray: cfg.dash || null,
      };
    }

    function onEachFeature(feature, layer) {
      const p = feature.properties;

      // Tooltip
      const label = p.zone.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      layer.bindTooltip(
        `<div class="zone-name">${label}</div>` +
        (p.risk !== 'none' ? `<div>Risk: <strong style="color:${RISK_COLORS[p.risk]}">${p.risk}</strong></div>` : '') +
        `<div style="color:#999;font-size:11px">${p.description.substring(0, 80)}â€¦</div>`,
        { className: 'zone-tooltip', sticky: true }
      );

      // Hover highlight
      layer.on('mouseover', function (e) {
        if (layer.setStyle) {
          layer.setStyle({ fillOpacity: 0.5, weight: 3 });
        }
        infoCtrl.update(p);
      });
      layer.on('mouseout', function (e) {
        geojsonLayer.resetStyle(layer);
        infoCtrl.update();
      });
    }

    // Add polygons
    const geojsonLayer = L.geoJSON(geojsonData, {
      style: styleFeature,
      onEachFeature: onEachFeature,
      filter: (f) => f.geometry.type === 'Polygon',
      pointToLayer: null,
    }).addTo(map);

    // Add points (cameras, corners)
    L.geoJSON(geojsonData, {
      filter: (f) => f.geometry.type === 'Point',
      pointToLayer: (f, latlng) => {
        const isCamera = f.properties.zone.includes('camera');
        return L.circleMarker(latlng, {
          radius: isCamera ? 8 : 5,
          fillColor: isCamera ? '#e040fb' : '#00ccff',
          color: isCamera ? '#ea80fc' : '#80deea',
          weight: 2,
          fillOpacity: 0.9,
        });
      },
      onEachFeature: (f, layer) => {
        const label = f.properties.zone.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        layer.bindTooltip(
          `<div class="zone-name">${label}</div><div style="color:#999">${f.properties.description}</div>`,
          { className: 'zone-tooltip' }
        );
        layer.on('mouseover', () => infoCtrl.update(f.properties));
        layer.on('mouseout', () => infoCtrl.update());
      }
    }).addTo(map);

    // Fit bounds
    map.fitBounds(geojsonLayer.getBounds().pad(0.3));

    // â”€â”€â”€ Layer Control â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // Group features for toggle (simplified â€” all on one layer here)
  </script>
</body>
</html>
